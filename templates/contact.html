<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - {{ user.display_name }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
body { font-family: Arial, sans-serif; text-align: center; margin: 0; min-height: 100vh;
background: linear-gradient(120deg, rgba(184, 255, 253, 1) 0%, rgba(255, 186, 211, 1) 100%); padding: 16px; }
.card { background: white; width: 100%; max-width: 420px; margin: 24px auto; padding: 24px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
h1 { margin: 10px 0; color: black; font-size: clamp(1.1rem, 4vw, 1.4rem); }
p { color: #555; }
input, textarea { width: 100%; box-sizing: border-box; padding: 10px 14px; margin: 6px 0; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; }
textarea { height: 100px; resize: vertical; }
button { background: #008080; color: white; border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
button:hover { background: #006666; }
.success { color: #008080; font-weight: bold; margin: 10px 0; }
.error { color: #dc2626; font-weight: bold; margin: 10px 0; }
.back { display: inline-block; margin-top: 16px; color: #008080; text-decoration: none; font-size: 14px; }
</style>
</head>
<body>
<div class="card">
    <h1><i class="fas fa-envelope" style="color:#008080;"></i> {{ link.title }}</h1>
    <p>Send a message to {{ user.display_name }}</p>

    {% if success %}
        <p class="success">Message sent successfully!</p>
    {% else %}
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST" action="/contact/{{ link.id }}">
            <input type="text" name="name" placeholder="Your name" required>
            <input type="email" name="email" placeholder="Your email" required>
            <textarea name="message" placeholder="Your message..." required></textarea>
            <button type="submit">Send Message</button>
        </form>
    {% endif %}

    <a class="back" href="/u/{{ user.username }}">← Back to profile</a>
</div>
</body>
</html>
